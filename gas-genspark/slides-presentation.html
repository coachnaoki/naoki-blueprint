const G = '#CCFF00';
const D = '#121212';

function hl(text, keyword) {
  if (!keyword) return text;
  return text.replace(keyword,
    `<span style="background:${G};padding:0 6px;">${keyword}</span>`);
}

function renderTitle(s) {
  return `
  <div class="slide-container">
    <div class="absolute top-0 left-0 w-full h-5" style="background:${G}"></div>
    <div class="absolute bottom-0 left-0 w-full h-5" style="background:${D}"></div>
    <div class="flex-1 flex flex-col justify-center items-center px-16 z-10 text-center">
      <div class="mb-10 rounded-full w-32 h-32 flex items-center justify-center shadow-2xl" style="background:${D}">
        <i class="fas ${s.icon} text-6xl" style="color:${G}"></i>
      </div>
      <h1 class="text-7xl font-black leading-tight mb-2 tracking-wide" style="color:${D}">
        ${s.title.replace(/\n/g,'<br>')}
      </h1>
      ${(s.titleSuffix || s.titleHighlight) ? `<h1 class="text-7xl font-black leading-tight mb-8 tracking-wide" style="color:${D}">
        <span style="position:relative;z-index:1">${s.titleHighlight||''}<span style="position:absolute;bottom:5px;left:-5px;right:-5px;height:35%;background:${G};z-index:-1;transform:rotate(-1deg);display:block"></span></span>
        ${s.titleSuffix||''}
      </h1>` : ''}
      ${s.subtitle ? `<div class="px-10 py-6 rounded-xl border-l-8" style="background:#f0f0f0;border-color:${G}">
        <p class="text-4xl font-bold text-center" style="color:${D}">${s.subtitle}</p>
      </div>` : ''}
      <div class="absolute right-10 bottom-20 opacity-10">
        <i class="fas fa-trophy text-9xl" style="color:${D}"></i>
      </div>
      <div class="absolute left-10 top-20 opacity-10">
        <i class="fas fa-users text-9xl" style="color:${D}"></i>
      </div>
    </div>
  </div>`;
}

function renderThreeCards(s) {
  const cards = s.cards.map(c => `
    <div class="bg-gray-50 rounded-2xl p-6 flex flex-col items-center justify-center text-center shadow-sm" style="border-left:12px solid ${G}">
      <div class="mb-6 rounded-full w-24 h-24 flex items-center justify-center" style="background:${G}">

      <h2 class="text-4xl font-black mb-4" style="color:${D}">${c.title}</h2>

        ${c.lines.map(l=>`<p>${l}</p>`).join('')}
      </div>
    </div>`).join('');

  return `
  <div class="slide-container">
    <div class="absolute top-0 left-0 w-full h-4" style="background:${G}"></div>
    <div class="absolute bottom-0 left-0 w-full h-4" style="background:${D}"></div>
    <div class="flex-1 flex flex-col px-12 pt-12 pb-10">
      <div class="mb-10 border-b-4 border-gray-200 pb-4">
        <h1 class="text-7xl font-black tracking-tight" style="color:${D}">${hl(s.title, s.titleHighlight)}</h1>
      </div>
      <div class="flex-1 grid grid-cols-3 gap-8 items-stretch">${cards}</div>
    </div>
  </div>`;
}

function renderThreeTactics(s) {

    const bg = c.dark ? D : '#f9fafb';
    const border = `border-top: 12px solid ${c.dark ? G : D}`;
    const textCol = c.dark ? G : D;
    const subCol = c.dark ? '#9ca3af' : '#4b5563';

    const badgeBorder = c.dark ? `border:2px solid ${G}` : '';

    return `

             style="background:${badgeBg};${badgeBorder};color:${badgeText}">${c.role}</div>

        <div>
          <h1 class="text-7xl font-black tracking-tight" style="color:${D}">
            ${s.titleHighlight
              ? s.title.replace(s.titleHighlight,
                  `<span style="background:linear-gradient(180deg,transparent 65%,${G} 65%);display:inline">${s.titleHighlight}</span>`)

        </div>` : ''}

      <div class="flex-1 grid grid-cols-3 gap-6 items-stretch">${cards}</div>
    </div>
  </div>`;
}

function renderTwoColumns(s) {
  function colBadgeStyle(col) {
    if (col.badgeColor === 'green') return `background:${G};color:${D}`;
    if (col.badgeColor === 'dark')  return `background:${D};color:${G}`;
    return `background:#fff;color:${D}`;
  }
  function colBorderStyle(col) {
    if (col.borderColor === 'green') return `border-color:${G}`;
    return `border-color:${D}`;
  }
  function dividerStyle(col) {
    if (col.dividerColor === 'green') return `background:${G}`;
    return `background:${D}`;
  }
  function subStyle(col) {
    if (col.subColor === 'dark') return `color:${D}`;
    return 'color:#4b5563';
  }

  const cols = s.columns.map(col => `
    <div class="flex-1 bg-white border-4 rounded-3xl p-6 flex flex-col items-center relative card-shadow"
         style="${colBorderStyle(col)}">
      <div class="absolute -top-6 bg-white border-4 rounded-full shadow-md z-20 overflow-hidden"
           style="${colBorderStyle(col)}">
        <div class="px-10 py-3 text-4xl font-black" style="${colBadgeStyle(col)}">${col.badge}</div>
      </div>
      <div class="mt-10 flex-1 flex flex-col items-center justify-center text-center w-full">
        <div class="mb-6" style="color:${D}">
          <i class="fas ${col.icon} text-8xl ${col.iconStyle||''}"></i>
        </div>
        <p class="${col.mainSize||'text-6xl'} font-black mb-4 leading-tight w-full" style="color:${D}">
          ${col.main.replace(/\n/g,'<br>')}
        </p>
        ${col.sub ? `<div class="w-20 h-2 my-4 rounded-full" style="${dividerStyle(col)}"></div>
        <p class="text-3xl font-bold leading-snug" style="${subStyle(col)}">${col.sub.replace(/\n/g,'<br>')}</p>` : ''}
      </div>
    </div>`).join('');

  return `
  <div class="slide-container bg-split">
    <div class="absolute top-0 left-0 w-full h-4 z-20" style="background:${G}"></div>
    <div class="pt-10 px-12 pb-4 flex flex-col z-10 relative">
      <div class="flex justify-between items-end">
        <h1 class="text-6xl font-black tracking-tight leading-none">
          ${s.titleHighlight
            ? s.title.replace(s.titleHighlight,
                `<span class="highlight-marker">${s.titleHighlight}</span>`)
            : s.title}
        </h1>
        ${s.catchphrase ? `<div class="px-8 py-3 rounded-lg transform rotate-2 shadow-lg border-2 border-gray-900">
          <p class="text-3xl font-black whitespace-nowrap" style="color:${D}">${s.catchphrase}</p>
        </div>` : ''}
      </div>
    </div>
    <div class="flex-1 flex px-10 pb-10 gap-8 items-stretch mt-4 z-10 relative">${cols}</div>
    <div class="absolute bottom-0 left-0 w-full h-4 z-20" style="background:${D}"></div>
  </div>`;
}

function renderSteps(s) {
  function stepStyle(step) {
    if (step.style === 'green')     return { wrap:`background:#f9fafb;border-left:8px solid ${G}`, iconWrap:`background:#fff;border:4px solid ${G}`, iconColor:D, textColor:D, numColor:'#e5e7eb' };
    if (step.style === 'gray')      return { wrap:`background:#f0f0f0;border-left:8px solid #9ca3af`, iconWrap:`background:#e5e7eb;border:4px solid #9ca3af`, iconColor:'#6b7280', textColor:'#6b7280', numColor:'#d1d5db' };
    if (step.style === 'highlight') return { wrap:`background:${G};border-left:8px solid ${D}`, iconWrap:`background:${D}`, iconColor:G, textColor:D, numColor:`${D}`, numOpacity:'opacity:.2' };
    return {};
  }

  const compact = s.steps.length >= 3;
  const pyClass = compact ? 'py-3' : 'py-6';
  const iconSize = compact ? 'w-14 h-14' : 'w-20 h-20';
  const iconTextSize = compact ? 'text-2xl' : 'text-4xl';
  const contentSize = compact ? 'text-3xl' : 'text-5xl';
  const labelSize = compact ? 'text-xl' : 'text-2xl';
  const numSize = compact ? 'text-6xl' : 'text-8xl';
  const gapSize = compact ? 'gap-2' : 'gap-4';

  const steps = s.steps.map(step => {
    const st = stepStyle(step);
    return `
    <div class="rounded-2xl flex items-center px-8 ${pyClass} shadow-sm relative z-10" style="${st.wrap}">
      <div class="flex-shrink-0 ${iconSize} rounded-full flex items-center justify-center mr-6" style="${st.iconWrap}">
        <i class="fas ${step.icon} ${iconTextSize}" style="color:${st.iconColor}"></i>
      </div>
      <div class="flex-1 pr-24">
        <span class="${labelSize} font-bold mr-4" style="color:${st.textColor};opacity:.7">${step.label}</span>
        <p class="${contentSize} font-black leading-snug" style="color:${st.textColor}">${step.content}</p>
      </div>
      <div class="${numSize} font-black absolute right-6 top-1/2 transform -translate-y-1/2 -z-10 ${step.numOpacity||''}"
           style="color:${st.numColor}">${step.num}</div>
    </div>`;
  }).join('');

  return `
  <div class="slide-container">
    <div class="absolute top-0 left-0 w-full h-4 z-20" style="background:${G}"></div>
    <div class="pt-6 px-12 pb-1 flex justify-between items-end z-10">
      <div>
        ${s.label ? `<span class="text-gray-500 font-bold text-lg">${s.label}</span>` : ''}
        <h1 class="text-5xl font-black tracking-tight leading-none" style="color:${D}">
          <span class="border-b-8 inline-block pb-1" style="border-color:${G}">${s.titleUnderline}</span>！
        </h1>
      </div>
      ${s.catchphrase ? `<div class="text-right pb-2">
        <p class="text-2xl font-bold text-gray-400">${s.catchphrase}</p>
      </div>` : ''}
    </div>
    <div class="flex-1 flex flex-col px-12 pb-8 pt-3 ${gapSize} justify-start">${steps}</div>
    <div class="absolute bottom-0 left-0 w-full h-3 z-20" style="background:${D}"></div>
  </div>`;
}

            <i class="fas ${s.icon} text-8xl z-10 relative" style="color:${D}"></i>

function renderCodeBlock(s) {
  const lines = s.code.split('\n').map((line, i) => {
    const isHighlight = s.highlightLines && s.highlightLines.includes(i + 1);
    const bg = isHighlight ? 'background:rgba(204,255,0,0.15);border-left:4px solid ' + G : 'border-left:4px solid transparent';
    const escaped = line.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<div style="${bg};padding:2px 16px;"><span style="color:#6b7280;margin-right:16px;user-select:none;font-size:16px;">${String(i+1).padStart(2,' ')}</span><span>${escaped}</span></div>`;
  }).join('');

  return `
  <div class="slide-container">
    <div class="absolute top-0 left-0 w-full h-4 z-20" style="background:${G}"></div>
    <div class="absolute bottom-0 left-0 w-full h-3 z-20" style="background:${D}"></div>

      <div class="mb-4 pb-2 border-b-4 border-gray-200 flex items-center gap-4">
        ${s.icon ? `<div class="w-12 h-12 rounded-full flex items-center justify-center" style="background:${D}">
          <i class="fas ${s.icon} text-xl" style="color:${G}"></i>
        </div>` : ''}
        <h1 class="text-4xl font-black tracking-tight" style="color:${D}">${s.title}</h1>
        ${s.lang ? `<span class="ml-auto px-4 py-1 rounded-full text-lg font-bold" style="background:${G};color:${D}">${s.lang}</span>` : ''}
      </div>
      <div class="flex-1 rounded-2xl overflow-hidden shadow-lg" style="background:${D}">
        <pre style="margin:0;padding:14px 0;font-family:'Fira Code','SF Mono','Menlo',monospace;font-size:${s.fontSize||'20px'};line-height:1.6;color:#e5e7eb;overflow:hidden;">${lines}</pre>
      </div>
      ${s.note ? `<div class="mt-3 flex items-center gap-3">
        <div class="w-3 h-3 rounded-full" style="background:${G}"></div>
        <p class="text-xl font-bold text-gray-500">${s.note}</p>
      </div>` : ''}
    </div>
  </div>`;
}

function renderTable(s) {
  const hSize = s.headerSize || 'text-2xl';
  const cSize = s.cellSize || 'text-xl';
  const cellPy = s.compact ? 'py-1' : 'py-4';
  const headerPy = s.compact ? 'py-2' : 'py-5';
  const headerCells = s.headers.map(h =>
    `<th class="px-6 ${headerPy} text-left ${hSize} font-black" style="color:${G}">${h}</th>`
  ).join('');

  const bodyRows = s.rows.map((row, ri) => {
    const isHighlight = s.highlightRows && s.highlightRows.includes(ri);
    const rowBg = isHighlight ? `background:rgba(204,255,0,0.1)` : (ri % 2 === 0 ? 'background:#1a1a2e' : 'background:#16162a');
    const cells = row.map((cell, ci) => {
      const isFirstCol = ci === 0;
      const weight = isFirstCol ? 'font-black' : 'font-bold';
      const color = isHighlight ? G : (isFirstCol ? '#ffffff' : '#d1d5db');
      return `<td class="px-6 ${cellPy} ${cSize} ${weight}" style="color:${color}">${cell}</td>`;
    }).join('');
    return `<tr style="${rowBg}">${cells}</tr>`;
  }).join('');

  return `
  <div class="slide-container">
    <div class="absolute top-0 left-0 w-full h-4 z-20" style="background:${G}"></div>
    <div class="absolute bottom-0 left-0 w-full h-3 z-20" style="background:${D}"></div>
    <div class="flex-1 flex flex-col px-12 pt-6 pb-5">
      <div class="mb-3 pb-2 border-b-4 border-gray-200 flex items-center gap-4">
        ${s.icon ? `<div class="w-12 h-12 rounded-full flex items-center justify-center" style="background:${D}">
          <i class="fas ${s.icon} text-xl" style="color:${G}"></i>
        </div>` : ''}
        <h1 class="text-4xl font-black tracking-tight" style="color:${D}">${s.title}</h1>
      </div>
      <div class="flex-1 rounded-2xl overflow-hidden shadow-lg" style="background:${D}">
        <table class="w-full" style="border-collapse:collapse;">
          <thead>
            <tr style="border-bottom:3px solid ${G}">${headerCells}</tr>
          </thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
      ${s.note ? `<div class="mt-3 flex items-center gap-3">
        <div class="w-3 h-3 rounded-full" style="background:${G}"></div>
        <p class="text-xl font-bold text-gray-500">${s.note}</p>
      </div>` : ''}
    </div>
  </div>`;
}

function renderFlowchart(s) {
  const nodes = s.nodes.map((node, i) => {
    const isHighlight = node.highlight;
    const bg = isHighlight ? G : '#f9fafb';
    const textColor = isHighlight ? D : D;
    const borderColor = isHighlight ? D : '#e5e7eb';
    const arrow = i < s.nodes.length - 1
      ? `<div class="flex flex-col items-center" style="margin:2px 0">
           <div class="w-1 h-3" style="background:${G}"></div>
           <i class="fas fa-chevron-down text-sm" style="color:${G}"></i>
         </div>`
      : '';
    return `
      <div class="flex items-center gap-4 px-8 rounded-xl border-2 shadow-sm" style="background:${bg};border-color:${borderColor};padding-top:6px;padding-bottom:6px;width:75%;">
        ${node.icon ? `<i class="fas ${node.icon} text-xl" style="color:${isHighlight ? D : G}"></i>` : ''}
        <div class="flex-1">
          <p class="text-xl font-black" style="color:${textColor};line-height:1.3">${node.label}</p>
          ${node.sub ? `<p class="text-base font-bold text-gray-500" style="line-height:1.2">${node.sub}</p>` : ''}
        </div>
        ${node.right ? `<span class="text-base font-bold px-4 py-1 rounded-full" style="background:${D};color:${G}">${node.right}</span>` : ''}
      </div>
      ${arrow}`;
  }).join('');

  return `
  <div class="slide-container">
    <div class="absolute top-0 left-0 w-full h-4 z-20" style="background:${G}"></div>
    <div class="absolute bottom-0 left-0 w-full h-3 z-20" style="background:${D}"></div>
    <div class="flex-1 flex flex-col px-16 pt-6 pb-6">
      <div class="mb-4 pb-2 border-b-4 border-gray-200 flex items-center gap-4">
        ${s.icon ? `<div class="w-12 h-12 rounded-full flex items-center justify-center" style="background:${D}">
          <i class="fas ${s.icon} text-xl" style="color:${G}"></i>
        </div>` : ''}
        <h1 class="text-4xl font-black tracking-tight" style="color:${D}">${s.title}</h1>
      </div>
      <div class="flex-1 flex flex-col items-center justify-center">${nodes}</div>
    </div>
  </div>`;
}

function renderSlide(s) {
  switch (s.type) {
    case 'title':         return renderTitle(s);
    case 'three-cards':   return renderThreeCards(s);
    case 'three-tactics': return renderThreeTactics(s);
    case 'two-columns':   return renderTwoColumns(s);
    case 'steps':         return renderSteps(s);
    case 'big-message':   return renderBigMessage(s);
    case 'closing':       return renderClosing(s);
    case 'code-block':    return renderCodeBlock(s);
    case 'table':         return renderTable(s);
    case 'flowchart':     return renderFlowchart(s);
    default: return `<div class="slide-container flex items-center justify-center">
      <p class="text-4xl font-black text-gray-400">Unknown type: ${s.type}</p></div>`;
  }
}

// DOMContentLoaded 後に描画
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const slideParam = params.get('slide');
  const screenshotMode = slideParam !== null;

  const stage = document.getElementById('stage');

  if (screenshotMode) {
    const idx = Math.max(0, Math.min(parseInt(slideParam) - 1, SLIDE_SCRIPT.length - 1));
    document.body.style.background = '#f3f4f6';
    const div = document.createElement('div');
    div.className = 'slide active';
    div.innerHTML = renderSlide(SLIDE_SCRIPT[idx]);
    stage.appendChild(div);
    document.getElementById('nav').style.display = 'none';
  } else {
    SLIDE_SCRIPT.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'slide' + (i === 0 ? ' active' : '');
      div.innerHTML = renderSlide(s);
      stage.appendChild(div);
    });
    document.getElementById('counter').textContent = `1 / ${SLIDE_SCRIPT.length}`;
  }
});

let current = 0;
function changeSlide(dir) {
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  slides[current].classList.remove('active');
  current = Math.max(0, Math.min(total - 1, current + dir));
  slides[current].classList.add('active');
  document.getElementById('counter').textContent = (current + 1) + ' / ' + total;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changeSlide(-1);
});
</script>

<style>

  .slide { display: none; width: 1280px; height: 720px; }
  .slide.active { display: block; }
  .slide-container {
    width: 1280px; height: 720px;
    background: #fff; position: relative;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 10px 25px rgba(0,0,0,.15);
  }
  .bg-split { background: #f3f4f6; }
  .bg-split::before {
    content: ''; position: absolute;
    top: 0; left: 0; width: 50%; height: 100%;
    background: #f9fafb; z-index: 0;
  }
  .highlight-marker { position: relative; display: inline-block; }
  .highlight-marker::after {
    content: ''; position: absolute;

    background: #CCFF00; z-index: -1;
  }
  .card-shadow { box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05); }
  .diagonal-strip {
    position: absolute; top: 0; right: 0; width: 300px; height: 100%;
    background: repeating-linear-gradient(45deg, transparent, transparent 20px,
      rgba(204,255,0,.05) 20px, rgba(204,255,0,.05) 40px);
    pointer-events: none;
  }
  #nav {
    display: flex; align-items: center; gap: 24px;
    margin-top: 20px; color: #555;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700;
  }
  #nav button {
    background: #121212; color: #CCFF00;
    border: none; border-radius: 6px;
    padding: 10px 28px; font-size: 18px;
    font-family: inherit; font-weight: 700; cursor: pointer;
  }
  #nav button:hover { background: #333; }
  #nav button:disabled { background: #ccc; color: #999; cursor: default; }
  #counter { font-size: 18px; min-width: 90px; text-align: center; }
</style>

<div id="stage"></div>
<div id="nav">
  <button id="btn-prev" onclick="changeSlide(-1)" disabled>← 前へ</button>
  <span id="counter">- / -</span>
  <button id="btn-next" onclick="changeSlide(1)">次へ →</button>
</div>

</body>
